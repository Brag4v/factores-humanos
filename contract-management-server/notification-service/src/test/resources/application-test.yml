spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""

notification:
  scheduler:
    enabled: false
    process-cron: "-"
    retry-cron: "-"

logging:
  level:
    root: WARN
    com.cms.notification: WARN
    org.hibernate.SQL: WARN
    org.testcontainers: WARN
